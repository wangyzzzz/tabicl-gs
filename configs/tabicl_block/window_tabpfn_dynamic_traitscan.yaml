seed: 2026
max_snps: 10000
group_size: 100
n_groups: 100
grouping_strategy: window
outer_cv_folds: 5
trait_col: Heading_date
plink_prefix: genome/rice529/plink/rice529
phenotype_csv: genome/rice529/rice529_phe.csv
phenotype_sample_id_col: sample_id
pad_incomplete_last_block: true
include_block_scalar: false
collect_block_diagnostics: false
save_block_summaries: true
embedding_extraction_mode: current
main_models:
  - name: TabPFN-2stage
    stage1_backend: tabpfn
    stage2_backend: tabpfn
stage1:
  tabpfn:
    n_estimators: 1
    device: cuda
    fit_mode: fit_preprocessors
    ignore_pretraining_limits: true
    embedding_reduce_dim: 4
stage2:
  tabpfn:
    n_estimators: 1
    device: cuda
    fit_mode: fit_preprocessors
    ignore_pretraining_limits: true
baselines:
  rscript_path: /data/yes/envs/r_env/bin/Rscript
  sommer_method: mmer
  gblup: false
  bayesA: false
  bayesB: false
  bayesLasso: false
output_dir: outputs/tabicl_block/window_tabpfn_dynamic_traitscan
